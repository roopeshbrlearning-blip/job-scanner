# ===== SCANNER CONFIGURATION =====

# How far back to look (hours). 26 gives buffer over "last 24h" so nothing slips between runs.
lookback_hours: 26

# A job must match at least one of these (title or description) to be considered relevant.
include_keywords:
  - embedded
  - qnx
  - autosar
  - automotive software
  - adas
  - uds
  - embedded linux
  - kernel driver
  - firmware
  - rtos
  - microcontroller
  - bare metal
  - bare-metal
  - robotics
  - perception
  - autonomy
  - sensor fusion
  - device driver
  - electronic engineer
  - electronics engineer
  - hardware engineer
  - fpga

# The job TITLE must contain at least one of these words (keeps only real
# development roles, drops recruiting/managerial/ops jobs whose descriptions
# merely mention embedded/robotics). Remove all lines to disable.
title_must_contain:
  - engineer
  - developer
  - programmer
  - firmware
  - embedded
  - robotics
  - software

# Jobs whose TITLE matches any of these are dropped.
exclude_title_keywords:
  - director
  - manager
  - recruit
  - talent
  - people
  - human resources
  - supervisor
  - technician
  - coordinator
  - chief
  - vice president
  - " vp "
  - head of
  - recruiter
  - sales
  - marketing
  - account executive
  - engineering manager
  - product manager
  - intern            # remove this line if you want internships

# ---- Free public APIs (no key needed) ----
free_apis:
  remoteok: true
  remotive: true
  arbeitnow: true
  himalayas: true
  weworkremotely: true

# Remotive is search-based; these queries are run against it
remotive_searches: ["embedded", "firmware", "robotics"]

# ---- Adzuna (optional, free key: https://developer.adzuna.com) ----
adzuna:
  enabled: true            # runs only if ADZUNA_APP_ID / ADZUNA_APP_KEY secrets are set
  country: us
  queries: ["embedded software engineer", "firmware engineer", "robotics software engineer"]

# ---- Direct company ATS boards (closest thing to "every company's portal") ----
